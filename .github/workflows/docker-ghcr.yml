name: Build and Push Docker Image to GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional Docker image tag (e.g. dev, nightly). The version from gradle.properties is always applied.'
        required: false
        default: 'latest'
        type: string
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64/v8,linux/arm/v7'
        type: string

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: komga-webui/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew :komga:prepareThymeLeaf :komga:bootJar
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Get version
        id: version
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Dockerfile and context
        run: |
          JAR="komga-${{ steps.version.outputs.version }}.jar"
          mkdir -p komga/docker/assembly
          cp "komga/build/libs/${JAR}" komga/docker/assembly/
          sed "s/{{distributionArtifactFile}}/${JAR}/" komga/docker/Dockerfile.tpl > komga/docker/Dockerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: komga/docker
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/komga:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/komga:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
